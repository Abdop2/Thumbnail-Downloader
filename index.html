<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Thumbnails Downloader | أداة تحميل مصغرات يوتيوب</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(18, 18, 30, 0.7);
            --bg-card-hover: rgba(25, 25, 42, 0.85);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(255, 255, 255, 0.15);
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0c0;
            --text-muted: #7a7a90;
            --accent: #ff3b5c;
            --accent-glow: rgba(255, 59, 92, 0.5);
            --accent2: #6c5ce7;
            --accent2-glow: rgba(108, 92, 231, 0.45);
            --success: #00e676;
            --success-glow: rgba(0, 230, 118, 0.4);
            --warning: #ffaa00;
            --error: #ff5252;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 60px rgba(255, 59, 92, 0.25);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-heading: 'Poppins', 'Cairo', sans-serif;
            --font-body: 'Cairo', 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ── الخلفية المتحركة ── */
        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-animated .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: floatOrb 14s ease-in-out infinite;
            will-change: transform;
        }
        .bg-animated .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ff3b5c 0%, transparent 70%);
            top: -15%;
            left: -10%;
            animation-delay: 0s;
            animation-duration: 16s;
        }
        .bg-animated .orb:nth-child(2) {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, #6c5ce7 0%, transparent 70%);
            bottom: -18%;
            right: -8%;
            animation-delay: -5s;
            animation-duration: 19s;
        }
        .bg-animated .orb:nth-child(3) {
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, #00e676 0%, transparent 70%);
            top: 50%;
            left: 45%;
            animation-delay: -9s;
            animation-duration: 13s;
            opacity: 0.2;
        }
        .bg-animated .orb:nth-child(4) {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, #ff6b9d 0%, transparent 70%);
            top: 30%;
            right: 20%;
            animation-delay: -3s;
            animation-duration: 17s;
            opacity: 0.25;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        @keyframes floatOrb {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            20% {
                transform: translate(50px, -70px) scale(1.15);
            }
            40% {
                transform: translate(-30px, 40px) scale(0.9);
            }
            60% {
                transform: translate(-60px, -30px) scale(1.08);
            }
            80% {
                transform: translate(40px, 60px) scale(0.94);
            }
        }

        /* ── الحاوية الرئيسية ── */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* ── الهيدر ── */
        .header {
            text-align: center;
            animation: fadeInDown 0.7s ease-out;
        }
        .header .logo-icon {
            display: inline-block;
            font-size: 48px;
            margin-bottom: 8px;
            animation: pulseIcon 2.5s ease-in-out infinite;
            filter: drop-shadow(0 0 28px var(--accent-glow));
        }
        .header h1 {
            font-family: var(--font-heading);
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #e0d0f0 40%, #ffb0c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .header .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.02em;
            opacity: 0.8;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulseIcon {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        /* ── قسم الإدخال ── */
        .input-section {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 22px 26px;
            box-shadow: var(--shadow-card);
            transition: all var(--transition-smooth);
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }
        .input-section:focus-within {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-card), var(--shadow-glow);
            transform: translateY(-2px);
        }
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-wrapper {
            flex: 1;
            min-width: 240px;
            position: relative;
        }
        .input-wrapper .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition-fast);
        }
        .input-wrapper input {
            width: 100%;
            padding: 15px 48px 15px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 50px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            letter-spacing: 0.01em;
            transition: all var(--transition-fast);
            outline: none;
        }
        .input-wrapper input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        .input-wrapper input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 30px rgba(255, 59, 92, 0.2);
        }
        .input-wrapper input:focus~.input-icon {
            color: var(--accent);
        }
        .btn-primary {
            padding: 14px 28px;
            background: linear-gradient(135deg, #ff3b5c 0%, #e8314e 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all var(--transition-fast);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 25px rgba(255, 59, 92, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: scale(1.04);
            box-shadow: 0 10px 35px rgba(255, 59, 92, 0.55);
            background: linear-gradient(135deg, #ff4d6d 0%, #f03a56 100%);
        }
        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 4px 18px rgba(255, 59, 92, 0.5);
            transition: all 0.08s ease;
        }
        .btn-primary .spinner-btn {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        .btn-primary.loading .btn-text {
            display: none;
        }
        .btn-primary.loading .spinner-btn {
            display: inline-block;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── قسم النتائج ── */
        .results-section {
            display: none;
            animation: fadeInUp 0.5s ease-out 0.2s both;
        }
        .results-section.visible {
            display: block;
        }
        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }
        .results-header h3 {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }
        .results-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: 10px 18px;
            border-radius: 50px;
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all var(--transition-fast);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-sm:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .btn-sm:active {
            transform: scale(0.94);
            transition: all 0.08s ease;
        }
        .btn-sm.accent-outline {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(255, 59, 92, 0.06);
        }
        .btn-sm.accent-outline:hover {
            background: rgba(255, 59, 92, 0.15);
            box-shadow: 0 0 25px rgba(255, 59, 92, 0.3);
        }
        .thumbnails-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
        }

        /* ── بطاقة المصغرة ── */
        .thumb-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-smooth);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            animation: cardAppear 0.45s ease-out both;
            position: relative;
        }
        .thumb-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-glow);
            box-shadow: 0 16px 44px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 59, 92, 0.15);
            background: var(--bg-card-hover);
        }
        .thumb-card .image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }
        .thumb-card .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
        }
        .thumb-card:hover .image-wrapper img {
            transform: scale(1.06);
        }
        .thumb-card .image-wrapper .overlay-play {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-smooth);
            pointer-events: none;
        }
        .thumb-card:hover .image-wrapper .overlay-play {
            opacity: 1;
        }
        .overlay-play .play-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #111;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .thumb-card .card-info {
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .card-info .quality-name {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }
        .card-info .dimensions {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 400;
        }
        .card-info .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .card-actions .btn-xs {
            flex: 1;
            min-width: 55px;
            padding: 9px 10px;
            border-radius: 50px;
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: 0.7rem;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all var(--transition-fast);
            border: 1.2px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .card-actions .btn-xs:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
        }
        .card-actions .btn-xs.download-btn {
            background: rgba(255, 59, 92, 0.12);
            border-color: rgba(255, 59, 92, 0.35);
            color: #ff5e7a;
        }
        .card-actions .btn-xs.download-btn:hover {
            background: rgba(255, 59, 92, 0.22);
            box-shadow: 0 0 20px rgba(255, 59, 92, 0.3);
            border-color: var(--accent);
        }
        .card-actions .btn-xs.copy-btn:hover {
            border-color: var(--accent2);
            box-shadow: 0 0 16px var(--accent2-glow);
            color: #b0a0f0;
        }
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.94);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 25%, rgba(255, 255, 255, 0.09) 50%, rgba(255, 255, 255, 0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: var(--radius-sm);
        }
        .skeleton-img {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }
        .skeleton-text {
            height: 14px;
            width: 70%;
            margin: 4px 0;
            border-radius: 6px;
        }
        .skeleton-text.short {
            width: 45%;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* ── Toast notifications ── */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: auto;
            max-width: 92vw;
        }
        .toast {
            pointer-events: all;
            padding: 13px 22px;
            border-radius: 50px;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.02em;
            color: #fff;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
            animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1), toastOut 0.35s cubic-bezier(0.4, 0, 0.2, 1) 2.8s forwards;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .toast.success {
            background: rgba(0, 180, 90, 0.85);
            border: 1px solid rgba(0, 230, 118, 0.5);
        }
        .toast.error {
            background: rgba(220, 40, 40, 0.85);
            border: 1px solid rgba(255, 82, 82, 0.5);
        }
        .toast.info {
            background: rgba(50, 50, 70, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-30px) scale(0.85);
            }
        }

        /* ── رسالة الخطأ ── */
        .error-message {
            display: none;
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.4);
            border-radius: 50px;
            padding: 13px 22px;
            color: #ff7b7b;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
            animation: fadeInUp 0.4s ease-out;
        }
        .error-message.visible {
            display: block;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .thumbnails-grid {
                grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
                gap: 12px;
            }
            .input-row {
                flex-direction: column;
            }
            .btn-primary {
                width: 100%;
                justify-content: center;
                padding: 15px 24px;
            }
            .input-wrapper input {
                padding: 14px 44px 14px 14px;
                font-size: 0.88rem;
            }
            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .card-info {
                padding: 10px 12px;
            }
            .card-info .quality-name {
                font-size: 0.78rem;
            }
            .card-actions .btn-xs {
                font-size: 0.66rem;
                padding: 7px 8px;
            }
        }
        @media (max-width: 400px) {
            .thumbnails-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .input-section {
                padding: 16px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- الخلفية المتحركة -->
    <div class="bg-animated">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <div class="bg-grid"></div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- الحاوية الرئيسية -->
    <div class="main-container">
        <!-- الهيدر -->
        <header class="header">
            <div class="logo-icon">🎬</div>
            <h1>YouTube Thumbnails Downloader</h1>
            <p class="subtitle">أداة احترافية لتحميل مصغرات فيديوهات يوتيوب بجميع الجودات</p>
        </header>

        <!-- قسم الإدخال -->
        <section class="input-section" id="inputSection">
            <div class="input-row">
                <div class="input-wrapper">
                    <input
                    type="text"
                    id="urlInput"
                    placeholder="ألصق رابط فيديو يوتيوب هنا... youtube.com/watch?v=... أو youtu.be/..."
                    autocomplete="off"
                    >
                    <span class="input-icon">🔗</span>
                </div>
                <button class="btn-primary" id="fetchBtn" onclick="fetchThumbnails()">
                    <span class="btn-text">🔍 استخراج المصغرات</span>
                    <span class="spinner-btn"></span>
                </button>
            </div>
            <div class="error-message" id="errorMsg"></div>
        </section>

        <!-- قسم النتائج -->
        <section class="results-section" id="resultsSection">
            <div class="results-header">
                <h3>📸 المصغرات المتوفرة</h3>
                <div class="results-actions">
                    <button class="btn-sm accent-outline" onclick="downloadAll()" title="فتح جميع المصغرات في تبويبات جديدة">
                        📥 تحميل الكل
                    </button>
                    <button class="btn-sm" onclick="copyAllLinks()" title="نسخ جميع روابط المصغرات">
                        📋 نسخ جميع الروابط
                    </button>
                </div>
            </div>
            <div class="thumbnails-grid" id="thumbnailsGrid"></div>
        </section>
    </div>

    <script>
        // ─────────────────────────────
        // إعدادات الجودات
        // ─────────────────────────────
        const QUALITY_PRESETS = [
            { key: 'default', label: 'Default', suffix: 'default', width: 120, height: 90 },
            { key: 'mqdefault', label: 'Medium Quality', suffix: 'mqdefault', width: 320, height: 180 },
            { key: 'hqdefault', label: 'High Quality', suffix: 'hqdefault', width: 480, height: 360 },
            { key: 'sddefault', label: 'Standard Definition', suffix: 'sddefault', width: 640, height: 480 },
            { key: 'maxresdefault', label: 'Max Resolution (HD)', suffix: 'maxresdefault', width: 1280, height: 720 },
        ];

        // ─────────────────────────────
        // استخراج Video ID
        // ─────────────────────────────
        function extractVideoId(url) {
            if (!url || typeof url !== 'string') return null;
            const trimmed = url.trim();
            // أنماط روابط يوتيوب المختلفة
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/.+\?v=)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/ // لو دخل الـ ID مباشرة
            ];
            for (const pattern of patterns) {
                const match = trimmed.match(pattern);
                if (match && match[1]) {
                    return match[1];
                }
            }
            // محاولة إضافية: رابط به معامل v في أي مكان
            try {
                const urlObj = new URL(trimmed);
                const vParam = urlObj.searchParams.get('v');
                if (vParam && vParam.length === 11) return vParam;
                // لروابط shorts
                const pathParts = urlObj.pathname.split('/');
                const shortsIndex = pathParts.indexOf('shorts');
                if (shortsIndex !== -1 && pathParts[shortsIndex + 1] && pathParts[shortsIndex + 1].length === 11) {
                    return pathParts[shortsIndex + 1];
                }
            } catch (e) { /* ignore */ }
            return null;
        }

        // ─────────────────────────────
        // توليد روابط المصغرات
        // ─────────────────────────────
        function generateThumbnailUrls(videoId) {
            const baseUrl = `https://img.youtube.com/vi/${videoId}`;
            return QUALITY_PRESETS.map(q => ({
                ...q,
                url: `${baseUrl}/${q.suffix}.jpg`,
                videoId: videoId,
            }));
        }

        // ─────────────────────────────
        // Toast notification
        // ─────────────────────────────
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            container.appendChild(toast);
            // إزالة تلقائية بعد انتهاء الأنيميشن
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 3300);
        }

        // ─────────────────────────────
        // نسخ للنص للحافظة
        // ─────────────────────────────
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast('تم نسخ الرابط بنجاح!', 'success');
            } catch (err) {
                // fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('تم نسخ الرابط بنجاح!', 'success');
                } catch (e) {
                    showToast('فشل نسخ الرابط. حاول يدوياً.', 'error');
                }
                document.body.removeChild(textarea);
            }
        }

        // ─────────────────────────────
        // فتح صورة في تبويب جديد (للتحميل)
        // ─────────────────────────────
        function openImageInNewTab(url) {
            const win = window.open(url, '_blank', 'noopener,noreferrer');
            if (!win) {
                showToast('الرجاء السماح بالنوافذ المنبثقة لتحميل الصورة.', 'error');
            }
        }

        // ─────────────────────────────
        // تحميل كل الصور
        // ─────────────────────────────
        function downloadAll() {
            const grid = document.getElementById('thumbnailsGrid');
            const cards = grid.querySelectorAll('.thumb-card');
            if (cards.length === 0) {
                showToast('لا توجد مصغرات لتحميلها.', 'error');
                return;
            }
            const urls = [];
            cards.forEach(card => {
                const url = card.getAttribute('data-url');
                if (url) urls.push(url);
            });
            if (urls.length === 0) {
                showToast('لا توجد روابط متاحة.', 'error');
                return;
            }
            showToast(`جاري فتح ${urls.length} مصغرة في تبويبات جديدة...`, 'info');
            urls.forEach((url, i) => {
                setTimeout(() => {
                    openImageInNewTab(url);
                }, i * 350);
            });
        }

        // ─────────────────────────────
        // نسخ جميع الروابط
        // ─────────────────────────────
        function copyAllLinks() {
            const grid = document.getElementById('thumbnailsGrid');
            const cards = grid.querySelectorAll('.thumb-card');
            if (cards.length === 0) {
                showToast('لا توجد روابط لنسخها.', 'error');
                return;
            }
            const urls = [];
            cards.forEach(card => {
                const url = card.getAttribute('data-url');
                if (url) urls.push(url);
            });
            if (urls.length === 0) {
                showToast('لا توجد روابط.', 'error');
                return;
            }
            copyToClipboard(urls.join('\n'));
        }

        // ─────────────────────────────
        // التحقق من توفر صورة maxresdefault
        // عن طريق تحميلها والتحقق من الأبعاد
        // ─────────────────────────────
        function checkImageAvailability(url, expectedMinWidth) {
            return new Promise((resolve) => {
                const img = new Image();
                const timeout = setTimeout(() => {
                    img.src = '';
                    resolve({ available: false, naturalWidth: 0, naturalHeight: 0 });
                }, 6000);
                img.onload = () => {
                    clearTimeout(timeout);
                    const available = img.naturalWidth >= expectedMinWidth;
                    resolve({
                        available: available,
                        naturalWidth: img.naturalWidth,
                        naturalHeight: img.naturalHeight,
                    });
                };
                img.onerror = () => {
                    clearTimeout(timeout);
                    resolve({ available: false, naturalWidth: 0, naturalHeight: 0 });
                };
                img.src = url;
            });
        }

        // ─────────────────────────────
        // عرض skeleton loaders
        // ─────────────────────────────
        function showSkeletons(count = 5) {
            const grid = document.getElementById('thumbnailsGrid');
            grid.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const card = document.createElement('div');
                card.className = 'thumb-card';
                card.style.animationDelay = `${i * 0.06}s`;
                card.innerHTML = `
                    <div class="skeleton skeleton-img"></div>
                    <div style="padding:14px 16px;display:flex;flex-direction:column;gap:8px;">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text short"></div>
                        <div style="display:flex;gap:8px;margin-top:4px;">
                            <div class="skeleton" style="flex:1;height:32px;border-radius:50px;"></div>
                            <div class="skeleton" style="flex:1;height:32px;border-radius:50px;"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        // ─────────────────────────────
        // بناء بطاقة مصغرة
        // ─────────────────────────────
        function createThumbCard(qualityData, index) {
            const card = document.createElement('div');
            card.className = 'thumb-card';
            card.style.animationDelay = `${index * 0.08}s`;
            card.setAttribute('data-url', qualityData.url);
            card.setAttribute('data-quality', qualityData.key);

            const displayWidth = qualityData.actualWidth || qualityData.width;
            const displayHeight = qualityData.actualHeight || qualityData.height;

            card.innerHTML = `
                <div class="image-wrapper" onclick="openImageInNewTab('${qualityData.url}')" title="اضغط لفتح الصورة في تبويب جديد">
                    <img src="${qualityData.url}" alt="${qualityData.label}" loading="lazy" onerror="this.parentElement.parentElement.style.display='none';">
                    <div class="overlay-play">
                        <div class="play-icon">🔍</div>
                    </div>
                </div>
                <div class="card-info">
                    <span class="quality-name">${qualityData.label}</span>
                    <span class="dimensions">📐 ${displayWidth} × ${displayHeight} بكسل</span>
                    <div class="card-actions">
                        <button class="btn-xs download-btn" onclick="event.stopPropagation();openImageInNewTab('${qualityData.url}')" title="تحميل / فتح الصورة">
                            📥 تحميل
                        </button>
                        <button class="btn-xs copy-btn" onclick="event.stopPropagation();copyToClipboard('${qualityData.url}')" title="نسخ رابط الصورة">
                            📋 نسخ
                        </button>
                    </div>
                </div>
            `;
            return card;
        }

        // ─────────────────────────────
        // الوظيفة الرئيسية
        // ─────────────────────────────
        async function fetchThumbnails() {
            const urlInput = document.getElementById('urlInput');
            const errorMsg = document.getElementById('errorMsg');
            const resultsSection = document.getElementById('resultsSection');
            const fetchBtn = document.getElementById('fetchBtn');
            const grid = document.getElementById('thumbnailsGrid');

            // إخفاء الأخطاء السابقة
            errorMsg.classList.remove('visible');
            errorMsg.textContent = '';

            const rawUrl = urlInput.value.trim();
            if (!rawUrl) {
                errorMsg.textContent = '⚠️ الرجاء إدخال رابط فيديو يوتيوب أولاً.';
                errorMsg.classList.add('visible');
                showToast('الرجاء إدخال رابط الفيديو.', 'error');
                urlInput.focus();
                return;
            }

            const videoId = extractVideoId(rawUrl);
            if (!videoId) {
                errorMsg.textContent = '❌ رابط غير صالح! تأكد من إدخال رابط يوتيوب صحيح.';
                errorMsg.classList.add('visible');
                showToast('رابط غير صالح. تحقق من الرابط وحاول مجدداً.', 'error');
                urlInput.focus();
                return;
            }

            // حالة التحميل
            fetchBtn.classList.add('loading');
            fetchBtn.disabled = true;
            errorMsg.classList.remove('visible');
            resultsSection.classList.add('visible');
            showSkeletons(5);
            // سكرول ناعم للنتائج
            setTimeout(() => {
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);

            // توليد روابط المصغرات
            const thumbnailData = generateThumbnailUrls(videoId);

            // فحص maxresdefault فقط (لأنها قد لا تكون متوفرة)
            const maxresItem = thumbnailData.find(q => q.key === 'maxresdefault');
            let maxresAvailable = true;
            let actualDims = null;
            if (maxresItem) {
                const checkResult = await checkImageAvailability(maxresItem.url, 640);
                maxresAvailable = checkResult.available;
                if (checkResult.available && checkResult.naturalWidth > 0) {
                    actualDims = { width: checkResult.naturalWidth, height: checkResult.naturalHeight };
                }
            }

            // بناء النتائج
            grid.innerHTML = '';
            let cardIndex = 0;
            const filteredData = thumbnailData.filter(q => {
                if (q.key === 'maxresdefault' && !maxresAvailable) return false;
                return true;
            });

            if (filteredData.length === 0) {
                // لا توجد نتائج (نادر)
                grid.innerHTML =
                    '<p style="text-align:center;color:var(--text-muted);grid-column:1/-1;padding:30px;">لم يتم العثور على مصغرات متاحة لهذا الفيديو.</p>';
            } else {
                filteredData.forEach((q) => {
                    const dataWithDims = { ...q };
                    if (q.key === 'maxresdefault' && actualDims) {
                        dataWithDims.actualWidth = actualDims.width;
                        dataWithDims.actualHeight = actualDims.height;
                    }
                    const card = createThumbCard(dataWithDims, cardIndex);
                    grid.appendChild(card);
                    cardIndex++;
                });
            }

            // إنهاء التحميل
            fetchBtn.classList.remove('loading');
            fetchBtn.disabled = false;
            resultsSection.classList.add('visible');

            if (filteredData.length > 0) {
                showToast(`✅ تم العثور على ${filteredData.length} مصغرة للفيديو!`, 'success');
            } else {
                showToast('⚠️ لم يتم العثور على مصغرات. تأكد من أن الفيديو متاح.', 'error');
            }
        }

        // ─────────────────────────────
        // دعم الضغط على Enter
        // ─────────────────────────────
        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                fetchThumbnails();
            }
        });

        // ─────────────────────────────
        // لصق تلقائي عند تحميل الصفحة (اختياري)
        // ─────────────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            const urlInput = document.getElementById('urlInput');
            // محاولة قراءة الحافظة إذا أذن المستخدم (فقط عند التفاعل)
            urlInput.focus();
        });

        // ─────────────────────────────
        // معالجة لصق الرابط تلقائياً
        // ─────────────────────────────
        document.getElementById('urlInput').addEventListener('paste', function() {
            // إعطاء وقت للصق القيمة ثم محاولة الاستخراج التلقائي
            setTimeout(() => {
                const val = this.value.trim();
                if (val && extractVideoId(val)) {
                    // يمكن تفعيل الاستخراج التلقائي هنا إذا أردت
                    // fetchThumbnails();
                }
            }, 300);
        });

        console.log('🎬 YouTube Thumbnails Downloader - جاهز للعمل');
        console.log('💡 الصق رابط فيديو يوتيوب واضغط على الزر أو Enter');
    </script>
</body>
</html>
